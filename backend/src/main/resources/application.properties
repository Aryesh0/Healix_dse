# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# MongoDB – Healix Database
# ==============================
spring.data.mongodb.uri=mongodb://localhost:27017/healix_db
spring.data.mongodb.database=healix_db

# ==============================
# JWT Configuration
# Assumption: token stored in localStorage on the frontend.
# Token is sent as "Authorization: Bearer <token>" header.
# Secret must be >= 256 bits (32 chars) for HMAC-SHA256.
# ==============================
healix.jwt.secret=HealixSuperSecretKey2024!!SecureAndLong
healix.jwt.expiration-ms=86400000

# ==============================
# Logging
# ==============================
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.app=DEBUG

# ==============================
# CORS – handled in SecurityConfig
# ==============================
